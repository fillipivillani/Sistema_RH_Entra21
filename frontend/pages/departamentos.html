<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Departamentos - Sistema RH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="../assets/css/navbar.css">
  <link rel="stylesheet" href="../assets/css/departamentos.css">
</head>

<body>
  <div id="site-navbar"></div>

  <div class="container-fluid my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="page-title">Departamentos</h1>
      <button class="btn btn-primary" id="btn-novo-departamento" data-bs-toggle="modal" data-bs-target="#departamentoModal">
        ➕ Novo Departamento
      </button>
    </div>

    <!-- Loading Spinner -->
    <div id="loading-spinner" class="text-center my-5">
      <div class="spinner-border" role="status">
        <span class="visually-hidden">Carregando...</span>
      </div>
    </div>

    <!-- Departments Container -->
    <div id="departamentos-container" class="row g-4">
      <!-- Cards will be inserted here -->
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="text-center my-5" style="display: none;">
      <p class="text-muted">Nenhum departamento cadastrado.</p>
    </div>

    <!-- Error Alert -->
    <div id="error-alert" class="alert alert-danger alert-dismissible fade" role="alert" style="display: none;">
      <span id="error-message"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
    </div>
  </div>

  <!-- Modal para novo Departamento -->
  <div class="modal fade" id="departamentoModal" tabindex="-1" aria-labelledby="departamentoModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="departamentoModalLabel">Novo Departamento</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <form id="form-novo-departamento">
            <div class="mb-3">
              <label for="departamentoNome" class="form-label">Nome do Departamento</label>
              <input type="text" class="form-control" id="departamentoNome" placeholder="Ex: TI" required>
            </div>
            <div class="mb-3">
              <label for="departamentoDescricao" class="form-label">Descrição</label>
              <textarea class="form-control" id="departamentoDescricao" rows="3" placeholder="Descrição do departamento"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btn-salvar-departamento">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal para visualizar Funcionários do Departamento -->
  <div class="modal fade" id="funcionariosModal" tabindex="-1" aria-labelledby="funcionariosModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="funcionariosModalLabel">Funcionários</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <div id="funcionarios-modal-list" class="funcionarios-modal-list">
            <!-- Funcionários serão inseridos aqui -->
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP8IhRH9IoKD5Zm9JKKqJ76f5xDNK7kU2" crossorigin="anonymous"></script>
  <script src="../components/include-html.js"></script>
  <script src="../components/NavBar/navbar.js"></script>
  <script src="../assets/js/departamentos.js"></script>
</body>

</html>
