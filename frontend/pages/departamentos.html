<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Departamentos - Sistema RH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/navbar.css">
  <link rel="stylesheet" href="../assets/css/departamentos.css">
</head>
<body>
  <div id="site-navbar"></div>

  <main class="container-fluid my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="page-title">Departamentos</h1>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#departamentoModal">Novo Departamento</button>
    </div>

    <div id="loading" class="text-center my-5">
      <div class="spinner-border" role="status"></div>
    </div>

    <div id="departamentos-container" class="row g-4"></div>

    <p id="empty-state" class="text-center text-muted my-5" hidden>Nenhum departamento cadastrado.</p>
    <div id="alerta" class="alert alert-danger" hidden></div>
  </main>

  <div class="modal fade" id="departamentoModal" tabindex="-1">
    <div class="modal-dialog">
      <form id="form-departamento" class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5">Novo Departamento</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" name="nome" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Descrição</label>
            <textarea name="descricao" class="form-control" rows="3"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../components/navbar.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/departamentos.js"></script>
</body>
</html>
