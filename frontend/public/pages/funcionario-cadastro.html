<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cadastro de Funcionário - Sistema RH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/funcionario-cadastro.css">
  </head>
  <body>
    <div data-include="../components/NavBar.html"></div>
    <div class="container my-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Cadastro de Funcionário</h2>
      </div>

      <form id="form-cadastro" class="card p-3">
        <h5>Dados Pessoais</h5>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Nome</label>
            <input type="text" id="nome" class="form-control" required>
          </div>
          <div class="col-md-3">
            <label class="form-label">CPF</label>
            <input type="text" id="cpf" class="form-control" required>
          </div>
          <div class="col-md-3">
            <label class="form-label">RG</label>
            <input type="text" id="rg" class="form-control">
          </div>
          <div class="col-md-3">
            <label class="form-label">Data de nascimento</label>
            <input type="date" id="nascimento" class="form-control">
          </div>
          <div class="col-md-3">
            <label class="form-label">Telefone</label>
            <input type="tel" id="telefone" class="form-control">
          </div>
          <div class="col-md-6">
            <label class="form-label">E-mail</label>
            <input type="email" id="email" class="form-control">
          </div>
          <div class="col-12">
            <label class="form-label">Endereço</label>
            <input type="text" id="endereco" class="form-control">
          </div>
        </div>

        <hr>
        <h5>Dados Profissionais</h5>
        <div class="row g-3">
          <div class="col-md-3">
            <label class="form-label">Data admissão</label>
            <input type="date" id="admissao" class="form-control">
          </div>
          <div class="col-md-3">
            <label class="form-label">Departamento</label>
            <select id="dep" class="form-select"></select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Cargo</label>
            <select id="cargo" class="form-select"></select>
          </div>
          <div class="col-md-2">
            <label class="form-label">Salário</label>
            <input type="number" step="0.01" id="salario" class="form-control">
          </div>
          <div class="col-md-1">
            <label class="form-label">Status</label>
            <select id="status" class="form-select">
              <option value="ativo">Ativo</option>
              <option value="inativo">Inativo</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Foto</label>
            <div class="d-flex gap-2 align-items-center">
              <img id="photo-preview" src="/assets/images/avatar-placeholder.png" class="avatar-preview" alt="Preview" />
              <div>
                <input type="file" id="photo" accept="image/*" class="form-control form-control-sm">
                <small class="text-muted">Escolha uma imagem (jpg, png)</small>
              </div>
            </div>
          </div>
        </div>

        <div class="mt-4 text-end">
          <button type="button" id="btn-cancel" class="btn btn-secondary">Cancelar</button>
          <button type="submit" id="btn-save" class="btn btn-primary">Salvar</button>
        </div>
      </form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/funcionario-cadastro.js"></script>
    <script src="../components/include-html.js"></script>
  </body>
</html>
