<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Funcionários - Sistema RH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="../assets/css/funcionarios.css">
</head>

<body>
  <div data-include="../components/NavBar/NavBar.html"></div>
  <div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>Funcionários</h2>
      <a href="#" class="btn btn-primary" id="btn-new">Novo Funcionário</a>
    </div>

    <div class="card mb-3">
      <div class="card-body">
        <form id="filters" class="row g-2">
          <div class="col-md-3">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" id="filter-nome" placeholder="Nome">
          </div>
          <div class="col-md-2">
            <label class="form-label">CPF</label>
            <input type="text" class="form-control" id="filter-cpf" placeholder="CPF">
          </div>
          <div class="col-md-2">
            <label class="form-label">Departamento</label>
            <select id="filter-dep" class="form-select">
              <option value="">Todos</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label">Cargo</label>
            <select id="filter-cargo" class="form-select">
              <option value="">Todos</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label">Status</label>
            <select id="filter-status" class="form-select">
              <option value="">Todos</option>
              <option value="ativo">Ativo</option>
              <option value="inativo">Inativo</option>
            </select>
          </div>
          <div class="col-12 text-end mt-2">
            <button type="button" id="btn-filter" class="btn btn-outline-primary">Filtrar</button>
            <button type="button" id="btn-clear" class="btn btn-link">Limpar</button>
          </div>
        </form>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-hover" id="table-funcionarios">
        <thead class="table-light">
          <tr>
            <th>Foto</th>
            <th>Nome</th>
            <th>CPF</th>
            <th>Cargo</th>
            <th>Departamento</th>
            <th>Status</th>
            <th>Data de admissão</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/funcionarios.js"></script>
  <script src="../components/include-html.js"></script>
</body>

</html>
